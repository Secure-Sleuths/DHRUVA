# =============================================================================
# Investigation Playbook: Credential Dumping / LSASS Access
# Rule Groups: sysmon, windows, command_monitoring, win_authentication
# MITRE: T1003.001 (LSASS Memory), T1003.002 (SAM), T1003.003 (NTDS),
#        T1003.006 (DCSync), T1558 (Kerberos ticket theft), T1550 (Pass-the-Hash)
# Methodology reference: socworkflows.com "Credential Dumping Analyser"
#   (facts/checklist mined and rewritten into DHRUVA schema; prose not copied)
# =============================================================================

name: "Credential Dumping & LSASS Access Investigation"

# DEPLOYMENT DEPENDENCY:
#   "credential_access" is NOT a stock Wazuh group — stock Wazuh expresses
#   credential access via <mitre> tags, which select_playbook() does not read.
#   This group is created by DHRUVA's shipped rules (120020-120027) in
#     config/wazuh/dhruva-playbook-triggers.xml
#   which must be installed to /var/ossec/etc/rules/ on the manager. Without
#   that file this playbook NEVER FIRES. Those rules also require Sysmon on the
#   endpoints (Event 1 + Event 10) — see docs/SETUP-GUIDE.md.
#
# SELECTION WARNING: select_playbook() returns the FIRST playbook whose
# trigger_rule_groups intersect the alert's groups, over an unsorted glob.
# Keep triggers NARROW and specific to credential access.
#   - "win_authentication" deliberately OMITTED (owned by suspicious_login)
#   - rule 18100 deliberately OMITTED (already a suspicious_login trigger)
trigger_rule_groups:
  - "credential_access"

# Intentionally EMPTY. 61612 was previously listed but is a level="0" parent
# rule (if_sid inheritance only) — level-0 rules emit no alert, never reach
# OpenSearch, and so can never match here. The group above does the routing.
trigger_rule_ids: []

investigation_steps:
  - step: 1
    name: "Identify the dumping technique and triggering process"
    query_template: |
      SELECT timestamp, agent_name, agent_ip, rule_description,
             data_command, data_file, data_srcuser, data_md5, data_sha256
      FROM {enriched_alerts_index}
      WHERE agent_id = '{alert_agent_id}'
        AND rule_group IN ('sysmon', 'windows', 'command_monitoring')
        AND timestamp BETWEEN '{alert_timestamp}' - INTERVAL 30 MINUTES
            AND '{alert_timestamp}' + INTERVAL 30 MINUTES
      ORDER BY timestamp ASC
    assess: |
      - Which technique is indicated?
        * Mimikatz / sekurlsa (direct LSASS read)
        * ProcDump / comsvcs.dll MiniDump (LOLBin LSASS dump)
        * Volume Shadow Copy or reg save of SAM/SECURITY/SYSTEM hives
        * ntdsutil / NTDS.dit extraction (domain database)
        * DCSync (replication request from a non-DC host)
      - Triggering process: name, PID, parent process, image path, user context.
      - Is the binary running from an unexpected path (temp, downloads, appdata)?
      - Is it a renamed known tool? Check hash, not just filename.

  - step: 2
    name: "Verify LSASS access and process lineage"
    query_template: |
      SELECT timestamp, agent_name, rule_description, data_command,
             data_srcuser, rule_group
      FROM {enriched_alerts_index}
      WHERE agent_id = '{alert_agent_id}'
        AND rule_group IN ('sysmon', 'windows')
        AND timestamp BETWEEN '{alert_timestamp}' - INTERVAL 2 HOURS
            AND '{alert_timestamp}' + INTERVAL 1 HOUR
      ORDER BY timestamp ASC
    assess: |
      - Sysmon Event 10 (ProcessAccess) targeting lsass.exe — what granted access
        mask was requested? (0x1010 / 0x1410 are classic dump masks)
      - Event ID 4688 / Sysmon 1: what spawned the accessing process?
      - Is the parent chain plausible (EDR service) or suspicious
        (winword.exe -> powershell.exe -> procdump.exe)?
      - Was the process elevated, and how did it get there?

  - step: 3
    name: "Assess which credentials are at risk"
    query_template: |
      SELECT timestamp, agent_name, srcuser, dstuser, rule_description, rule_id
      FROM {enriched_alerts_index}
      WHERE agent_id = '{alert_agent_id}'
        AND rule_group IN ('win_authentication', 'windows')
        AND timestamp >= '{alert_timestamp}' - INTERVAL 24 HOURS
      ORDER BY timestamp ASC
    assess: |
      - Which accounts had active sessions on this host at dump time?
        (those credentials must be considered compromised)
      - Any DOMAIN ADMIN or service-account sessions present?
        -> treat as CRITICAL; enterprise-wide credential exposure.
      - Is this host a Domain Controller? (NTDS.dit access = full domain compromise)
      - Credential types exposed: NTLM hashes, Kerberos TGT/TGS, plaintext (WDigest),
        cached domain credentials.

  - step: 4
    name: "Hunt for post-dump credential use (lateral movement)"
    query_template: |
      SELECT timestamp, agent_name, srcip, dstip, srcuser, dstuser,
             rule_description, rule_group, data_command
      FROM {enriched_alerts_index}
      WHERE (srcuser = '{alert_user}' OR dstuser = '{alert_user}')
        AND timestamp >= '{alert_timestamp}'
        AND timestamp <= '{alert_timestamp}' + INTERVAL 12 HOURS
        AND rule_group IN ('win_authentication', 'windows', 'sysmon',
                           'network_connection', 'command_monitoring')
      ORDER BY timestamp ASC
      LIMIT 200
    assess: |
      - Event IDs 4624 (logon) / 4648 (explicit credential logon) on OTHER hosts
        using the exposed accounts?
      - Logon Type 3 (network) or 10 (RDP) fan-out from this host?
      - Pass-the-Hash indicators: NTLM logons where Kerberos is expected.
      - Any new service creation (7045) or scheduled task on remote hosts?

  - step: 5
    name: "Check for staging and exfiltration of dumped material"
    query_template: |
      SELECT timestamp, srcip, dstip, dstport, protocol,
             data_file, data_bytes_sent, rule_description
      FROM {enriched_alerts_index}
      WHERE agent_id = '{alert_agent_id}'
        AND timestamp >= '{alert_timestamp}' - INTERVAL 1 HOUR
        AND timestamp <= '{alert_timestamp}' + INTERVAL 6 HOURS
      ORDER BY timestamp ASC
    assess: |
      - Dump artifacts written to disk (lsass.dmp, *.dit, SAM/SYSTEM hive copies)?
      - Were they archived (7z/zip/rar) — classic staging before exfil?
      - Outbound transfer of those artifacts to external infrastructure?

verdict_criteria:
  true_positive:
    - "LSASS memory read by a non-security process with a dump access mask"
    - "Known credential-dumping tool executed (hash- or behavior-confirmed)"
    - "SAM/SECURITY/SYSTEM hive copy or NTDS.dit extraction outside backup windows"
    - "DCSync replication request originating from a non-domain-controller host"
    - "Dump artifact created on disk, then archived or transferred outbound"
    - "Post-dump authentication of the exposed accounts on other hosts"

  false_positive:
    - "EDR/AV or approved DFIR tooling legitimately reading LSASS"
    - "Backup or vulnerability-scanning agent accessing registry hives on schedule"
    - "Sanctioned red-team or penetration-test engagement (verify against ROE window)"
    - "Crash-dump/diagnostic tooling (WER, ProcDump run by IT for a support case)"

  needs_investigation:
    - "LSASS access by an unrecognized but unsigned-benign-looking process"
    - "Hive access inside a backup window but from an unexpected account"
    - "Tool signature matched but no downstream credential use observed"

recommended_actions:
  if_true_positive:
    - "ISOLATE: network-isolate the affected host immediately"
    - "RESET: force password reset for EVERY account with a session on that host"
    - "RESET (priority): domain admin / service accounts first; rotate twice for krbtgt if a Domain Controller or NTDS.dit was involved"
    - "PRESERVE: memory capture + disk image before remediation"
    - "REVOKE: invalidate Kerberos tickets for exposed accounts"
    - "HUNT: sweep for the exposed accounts authenticating on any other host"
    - "NOTIFY: escalate to client IR — credential compromise is never auto-closed"

  if_false_positive:
    - "Tag alert with FP reason and the approved tool/process for the feedback loop"
    - "If recurring, propose a scoped detection exclusion (by hash + path + account, never by filename alone) to the Detection agent"
    - "Add the tool to the approved-security-tooling baseline"
