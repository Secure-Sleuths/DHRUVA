# =============================================================================
# Risk Criteria - SecureSleuths DHRUVA Guidance
# This document defines how agents assess risk and priority.
# Modify per client engagement to reflect their specific environment.
# =============================================================================

asset_criticality:
  tier_1_critical:
    description: "Production databases, authentication servers, payment systems, secrets managers"
    patterns:
      - "*-prod-db*"
      - "*-auth-*"
      - "*-payment-*"
      - "*vault*"
      - "*-secrets-*"
    risk_multiplier: 3.0
    
  tier_2_important:
    description: "Production application servers, CI/CD, monitoring infrastructure"
    patterns:
      - "*-prod-app*"
      - "*-cicd-*"
      - "*jenkins*"
      - "*-monitor-*"
      - "*grafana*"
    risk_multiplier: 2.0
    
  tier_3_standard:
    description: "Staging environments, internal tools, development infrastructure"
    patterns:
      - "*-staging-*"
      - "*-dev-*"
      - "*-internal-*"
    risk_multiplier: 1.0
    
  tier_4_low:
    description: "Test environments, sandbox, non-production lab systems"
    patterns:
      - "*-test-*"
      - "*-sandbox-*"
      - "*-lab-*"
    risk_multiplier: 0.5

user_risk_profiles:
  high_risk:
    description: "Service accounts, admin users, root, external contractors"
    indicators:
      - "has_admin_privileges"
      - "is_service_account"
      - "is_external_contractor"
      - "recently_onboarded_days: 30"
    risk_multiplier: 2.5
    
  elevated:
    description: "Engineers with production access, DevOps, SRE"
    indicators:
      - "has_production_access"
      - "is_devops_role"
    risk_multiplier: 1.5
    
  standard:
    description: "Regular employees with standard access"
    risk_multiplier: 1.0

alert_severity_mapping:
  # Maps Wazuh rule levels (1-15) to risk categories
  critical: [13, 14, 15]
  high: [10, 11, 12]
  medium: [7, 8, 9]
  low: [4, 5, 6]
  informational: [1, 2, 3]

time_context:
  business_hours:
    start: "09:00"
    end: "18:00"
    timezone: "Asia/Kolkata"
    days: ["monday", "tuesday", "wednesday", "thursday", "friday"]
  
  maintenance_windows:
    - name: "Weekly patching"
      day: "sunday"
      start: "02:00"
      end: "06:00"
    - name: "Deployment window"
      days: ["tuesday", "thursday"]
      start: "22:00"
      end: "23:59"
      
  risk_adjustments:
    outside_business_hours_multiplier: 1.5
    maintenance_window_multiplier: 0.3
    weekend_multiplier: 1.3

mitre_attack_priority:
  # Higher priority MITRE techniques
  critical_techniques:
    - "T1003"  # OS Credential Dumping
    - "T1059"  # Command and Scripting Interpreter
    - "T1053"  # Scheduled Task/Job
    - "T1021"  # Remote Services
    - "T1110"  # Brute Force
    - "T1190"  # Exploit Public-Facing Application
    - "T1486"  # Data Encrypted for Impact (Ransomware)
    - "T1070"  # Indicator Removal
    - "T1098"  # Account Manipulation
    - "T1078"  # Valid Accounts

composite_risk_formula: |
  risk_score = (
    alert_base_severity 
    * asset_criticality_multiplier 
    * user_risk_multiplier 
    * time_context_multiplier
    * mitre_priority_boost
  )
  
  # Clamp to 0-100 scale
  final_score = min(100, max(0, risk_score))
  
  # Classification:
  # 90-100: CRITICAL - Immediate human review required
  # 70-89:  HIGH     - Agent triage with human verification
  # 40-69:  MEDIUM   - Agent triage, auto-close if high confidence
  # 0-39:   LOW      - Agent auto-triage, batch review
