           stroke="#35b9d1" stroke-width="3" stroke-opacity=".85"/>
  <circle cx="105.7" cy="39.7" r="5.5" fill="#35b9d1"/>
  <polygon points="60,16 66,54 92,60 66,66 60,104 54,66 28,60 54,54" fill="#f2ecd6"/>
  <circle cx="60" cy="60" r="4" fill="#35b9d1"/>
</svg>
